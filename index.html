<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CrewBriefs</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
body{margin:0;font-family:system-ui;background:#020817;color:#e2e8f0;}
header{padding:14px;background:#0f172a;font-size:20px;}
input,select,button{margin:6px;padding:10px;border-radius:6px;border:none;}
button{background:#2563eb;color:white;}
</style>
</head>

<body>

<header>CrewBriefs</header>

<div style="padding:15px">

<input id="flight" placeholder="Flight Number">

<select id="origin"></select>
<select id="destination"></select>
<select id="hotel"></select>

<div id="amenities"></div>

<br>
<button id="saveBtn">Save Brief</button>
<button id="syncBtn">Sync</button>

<hr>
<div id="list"></div>

</div>

<script src="db.js"></script>
<script src="sync.js"></script>
<script src="app.js"></script>

<script>
if("serviceWorker" in navigator){
 window.addEventListener("load",()=>{
  navigator.serviceWorker.register("./sw.js");
 });
}
</script>

</body>
</html>
